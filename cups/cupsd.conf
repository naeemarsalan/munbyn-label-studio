# cupsd.conf for the Munbyn ITPP941 container.
# LAN-accessible CUPS server: web UI + IPP printing reachable from other hosts
# and from the sibling label-studio container.

LogLevel warn
MaxLogSize 1m
PageLogFormat

# Listen on every interface (inside the container) and on the domain socket.
Listen 0.0.0.0:631
Listen /run/cups/cups.sock

# Accept requests no matter what Host header the client sends (by IP, hostname,
# .local, or the docker service name "munbyn-cups"). Without this, CUPS 2.x
# answers "Bad Request" for some clients.
ServerAlias *

# Share queues on the LAN and advertise over DNS-SD/Bonjour when avahi is present.
Browsing On
BrowseLocalProtocols dnssd
DefaultShared Yes
WebInterface Yes

DefaultAuthType Basic

# --- Access control (connection level, by address) ------------------------
# Deny by default; allow loopback, the server's own subnets, and RFC1918 LANs
# (covers the docker bridge network the studio container connects from).
<Location />
  Order allow,deny
  Allow localhost
  Allow @LOCAL
  Allow 192.168.0.0/16
  Allow 10.0.0.0/8
  Allow 172.16.0.0/12
</Location>

<Location /admin>
  Order allow,deny
  Allow localhost
  Allow @LOCAL
  Allow 192.168.0.0/16
  Allow 10.0.0.0/8
  Allow 172.16.0.0/12
</Location>

<Location /admin/conf>
  AuthType Default
  Require user @SYSTEM
  Order allow,deny
  Allow localhost
  Allow @LOCAL
  Allow 192.168.0.0/16
  Allow 10.0.0.0/8
  Allow 172.16.0.0/12
</Location>

<Location /admin/log>
  AuthType Default
  Require user @SYSTEM
  Order allow,deny
  Allow localhost
  Allow @LOCAL
  Allow 192.168.0.0/16
  Allow 10.0.0.0/8
  Allow 172.16.0.0/12
</Location>

# --- Operation policy (stock CUPS default) --------------------------------
# Printing/job ops are allowed by default (deny,allow) and gated by the
# Location ACLs above; administrative ops additionally require a @SYSTEM login.
<Policy default>
  JobPrivateAccess default
  JobPrivateValues default
  SubscriptionPrivateAccess default
  SubscriptionPrivateValues default

  <Limit Send-Document Send-URI Hold-Job Release-Job Restart-Job Purge-Jobs Set-Job-Attributes Create-Job-Subscription Renew-Subscription Cancel-Subscription Get-Notifications Reprocess-Job Cancel-Current-Job Suspend-Current-Job Resume-Job Cancel-My-Jobs Close-Job CUPS-Move-Job CUPS-Get-Document>
    Require user @OWNER @SYSTEM
    Order deny,allow
  </Limit>

  <Limit CUPS-Add-Modify-Printer CUPS-Delete-Printer CUPS-Add-Modify-Class CUPS-Delete-Class CUPS-Set-Default CUPS-Get-Devices>
    AuthType Default
    Require user @SYSTEM
    Order deny,allow
  </Limit>

  <Limit Pause-Printer Resume-Printer Enable-Printer Disable-Printer Pause-Printer-After-Current-Job Hold-New-Jobs Release-Held-New-Jobs Deactivate-Printer Activate-Printer Restart-Printer Shutdown-Printer Startup-Printer Promote-Job Schedule-Job-After Cancel-Jobs CUPS-Accept-Jobs CUPS-Reject-Jobs>
    AuthType Default
    Require user @SYSTEM
    Order deny,allow
  </Limit>

  <Limit Cancel-Job CUPS-Authenticate-Job>
    Require user @OWNER @SYSTEM
    Order deny,allow
  </Limit>

  <Limit All>
    Order deny,allow
  </Limit>
</Policy>
